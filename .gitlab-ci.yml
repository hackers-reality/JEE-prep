# CI for JEE-prep (Next.js 16 + Prisma 7)
# Runs on every push and merge request: installs deps, generates the Prisma
# client (gitignored, so it must be regenerated in CI), then lint + typecheck
# + build.

default:
  image: node:24
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/

stages:
  - prepare
  - verify

variables:
  # Prisma needs a DATABASE_URL at generate time; a dummy SQLite URL is enough
  # since we only generate the client and do not connect during CI.
  DATABASE_URL: "file:./prisma/ci.db"
  NEXT_TELEMETRY_DISABLED: "1"

install:
  stage: prepare
  script:
    - npm ci --cache .npm --prefer-offline
    - npx prisma generate
  artifacts:
    expire_in: 1 hour
    paths:
      - node_modules/
      - src/generated/

lint:
  stage: verify
  needs: [install]
  script:
    - npm run lint

typecheck:
  stage: verify
  needs: [install]
  script:
    - npx tsc --noEmit

build:
  stage: verify
  needs: [install]
  script:
    - npm run build
  artifacts:
    expire_in: 1 hour
    paths:
      - .next/
